# ============================================================
#  CloudWithYasApp — CI/CD Deploy Pipeline
#  Deploys frontend to AWS S3 and syncs repo to GitHub
#
#  Triggers:
#    • Push to main branch (auto-deploy)
#    • Manual trigger from GitHub Actions tab
#
#  What it does:
#    1. Uploads all frontend files to your S3 bucket
#    2. Invalidates CloudFront cache (instant live update)
#    3. Commits & pushes any local changes back to GitHub
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    AWS_ACCESS_KEY_ID      → Your AWS IAM user access key
#    AWS_SECRET_ACCESS_KEY  → Your AWS IAM user secret key
#    AWS_REGION             → e.g. us-east-1
#    S3_BUCKET_NAME         → e.g. cloudwithyasapp-feedback
#    CLOUDFRONT_DIST_ID     → e.g. E1ABC123DEF456 (leave blank if not using CloudFront)
# ============================================================

name: 🚀 Deploy CloudWithYasApp

on:
  push:
    branches:
      - main                   # Auto-deploy on every push to main
  workflow_dispatch:            # Also allows manual trigger from GitHub Actions UI
    inputs:
      skip_cloudfront:
        description: 'Skip CloudFront invalidation? (yes/no)'
        required: false
        default: 'no'

# Only allow one deployment at a time — prevents race conditions
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ============================================================
  #  JOB 1 — DEPLOY TO AWS S3
  # ============================================================
  deploy-to-s3:
    name: 📦 Upload to S3
    runs-on: ubuntu-latest

    steps:

      # Step 1: Check out the repository code
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials from GitHub Secrets
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Step 3: Verify the S3 bucket is reachable before deploying
      - name: 🔍 Verify S3 bucket access
        run: |
          echo "Checking bucket: ${{ secrets.S3_BUCKET_NAME }}"
          aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }} || {
            echo "❌ ERROR: Cannot access S3 bucket. Check your bucket name and IAM permissions."
            exit 1
          }
          echo "✅ Bucket is accessible"

      # Step 4: Upload HTML files (no cache — always serve fresh)
      - name: 🌐 Upload HTML files
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --delete \
            --acl public-read
          echo "✅ HTML files uploaded"

      # Step 5: Upload CSS files (cache for 1 hour)
      - name: 🎨 Upload CSS files
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.css" \
            --cache-control "public, max-age=3600" \
            --content-type "text/css; charset=utf-8" \
            --acl public-read
          echo "✅ CSS files uploaded"

      # Step 6: Upload JavaScript files (cache for 1 hour)
      - name: ⚡ Upload JavaScript files
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.js" \
            --cache-control "public, max-age=3600" \
            --content-type "application/javascript; charset=utf-8" \
            --acl public-read
          echo "✅ JavaScript files uploaded"

      # Step 7: Upload any images or assets (cache for 7 days)
      - name: 🖼️ Upload assets (images / icons)
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.svg" \
            --include "*.ico" \
            --include "*.webp" \
            --cache-control "public, max-age=604800" \
            --acl public-read
          echo "✅ Assets uploaded"

      # Step 8: Print summary of what's in the bucket
      - name: 📋 List deployed files
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Files in S3 bucket:"
          aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}/ --recursive --human-readable
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # Step 9: Invalidate CloudFront cache so changes go live instantly
      #         Skip if CLOUDFRONT_DIST_ID secret is not set or user chose to skip
      #         Note: secrets cannot be referenced directly inside `if:` conditions,
      #         so we pass it through env and check the env var instead.
      - name: 🌍 Invalidate CloudFront cache
        if: github.event.inputs.skip_cloudfront != 'yes'
        env:
          CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}
        run: |
          if [ -z "$CLOUDFRONT_DIST_ID" ]; then
            echo "ℹ️  CLOUDFRONT_DIST_ID not set — skipping CloudFront invalidation"
            exit 0
          fi
          echo "Creating CloudFront invalidation for distribution: $CLOUDFRONT_DIST_ID"
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DIST_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "✅ CloudFront invalidation created: $INVALIDATION_ID"
          echo "ℹ️  Changes will be live globally in ~30–60 seconds"

      # Step 10: Print the live URL
      - name: 🔗 Print live URLs
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 DEPLOYMENT COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          REGION="${{ secrets.AWS_REGION }}"
          BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          echo "📋 Feedback Form:"
          echo "   http://${BUCKET}.s3-website-${REGION}.amazonaws.com/feedback-form.html"
          echo ""
          echo "📊 Admin Dashboard:"
          echo "   http://${BUCKET}.s3-website-${REGION}.amazonaws.com/admin-dashboard.html"
          echo ""
          if [ -n "${{ secrets.CLOUDFRONT_DIST_ID }}" ]; then
            echo "🌍 CloudFront cache invalidated — HTTPS version updating now"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ============================================================
  #  JOB 2 — PUSH TO GITHUB (runs after S3 deploy succeeds)
  # ============================================================
  push-to-github:
    name: 📤 Sync to GitHub
    runs-on: ubuntu-latest
    needs: deploy-to-s3        # Only runs if S3 deploy succeeded

    steps:

      # Step 1: Check out the full git history (needed for commit + push)
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Full history so git push works correctly
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set git identity for the automated commit
      - name: 🪪 Set git identity
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"

      # Step 3: Check if there are any uncommitted changes to push
      - name: 🔍 Check for changes
        id: check_changes
        run: |
          git status
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected — will commit and push"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No uncommitted changes — nothing to push"
          fi

      # Step 4: Stage all changes
      - name: ➕ Stage all changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add .
          echo "Staged files:"
          git diff --staged --name-only

      # Step 5: Commit with a descriptive message including the commit SHA and timestamp
      - name: 💾 Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "🚀 Auto-deploy: ${TIMESTAMP}

          Deployed by GitHub Actions CI/CD pipeline
          Trigger: ${{ github.event_name }}
          Branch:  ${{ github.ref_name }}
          Commit:  ${{ github.sha }}

          Files deployed to S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"

      # Step 6: Push to GitHub
      - name: 📤 Push to GitHub
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin main
          echo "✅ Successfully pushed to GitHub"

      # Step 7: Print summary
      - name: 📋 GitHub sync summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 GITHUB SYNC COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Repository: ${{ github.repository }}"
          echo "Branch:     ${{ github.ref_name }}"
          echo "Run URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ============================================================
  #  JOB 3 — FINAL SUMMARY (always runs last)
  # ============================================================
  summary:
    name: ✅ Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-to-s3, push-to-github]
    if: always()               # Run even if previous jobs failed

    steps:
      - name: 📊 Print final status
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     CloudWithYasApp Deploy Report     ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  S3 Deploy   : ${{ needs.deploy-to-s3.result == 'success' && '✅ SUCCESS' || '❌ FAILED ' }}"
          echo "║  GitHub Sync : ${{ needs.push-to-github.result == 'success' && '✅ SUCCESS' || needs.push-to-github.result == 'skipped' && '⏭️  SKIPPED' || '❌ FAILED ' }}"
          echo "║  Triggered by: ${{ github.actor }}"
          echo "║  Run #:        ${{ github.run_number }}"
          echo "╚══════════════════════════════════════╝"